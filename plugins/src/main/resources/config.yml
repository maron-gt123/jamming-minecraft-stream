http:
  port: 8080
  path: /event

events:
  gift:
    enabled: true
  like:
    enabled: true
  follow:
    enabled: true
  share:
    enabled: true
  subscribe:
    enabled: true
  comment:
    enabled: true

jammingbox:
  clear:
    countdown: 15
  replace:
    enabled: true
    bottom: IRON_BLOCK
    middle: GOLD_BLOCK
    top: DIAMOND_BLOCK

commands:
  follow:
    - command: "say {nickname} follow"
  share:
    - command: "say {nickname} share"
  subscribe:
    - command: "say {nickname} subscribe"
  like:
    - count: 50
      command: "jammingevent text {nickname}が50LIKE達成"
    - count: 100
      commands:
        - "jammingevent tnt 100"
        - "jammingevent title {nickname} 100LIKE"

  gift:
    - gift_name: "Heart Me"
      commands:
        - "jammingevent tnt"
        - "jammingevent title Heart Me thanks"
    - gift_name: "Rose"
      commands:
        - "jammingevent extnt"
        - "jammingevent title test"